services:
  postgres:
    image: postgres:15-alpine
    container_name: fawry-postgres
    environment:
      POSTGRES_DB: fawry_routing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - fawry-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fawry_routing"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: fawry-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fawry_routing
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-please-override-me-with-a-long-random-base64-value}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: fawry-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  fawry-pg-data:
